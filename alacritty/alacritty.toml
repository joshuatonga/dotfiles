# Elflord — based on vim's elflord.vim palette
[colors.bright]
black = "0x666666"
blue = "0x80a0ff"   # elflord Comment
cyan = "0x40ffff"   # elflord Identifier
green = "0x60ff60"  # elflord Type
magenta = "0xff80ff" # elflord PreProc
red = "0xff0000"    # elflord Special/Operator
white = "0xffffff"
yellow = "0xffff00"

[colors.normal]
black = "0x000000"
blue = "0x6688ee"
cyan = "0x00cdcd"
green = "0x00cd00"
magenta = "0xcd00cd"
red = "0xcd0000"
white = "0xcccccc"
yellow = "0xcdcd00"

[colors.primary]
background = "#000000"
foreground = "#00ffff" # elflord Normal is cyan on black

[colors.cursor]
text = "#000000"
cursor = "#40ffff"

[env]
TERM = "xterm-256color"

[font]
size = {{term_font_size}}

[font.bold]
family = "{{term_font_name}}"
style = "Bold"

[font.bold_italic]
family = "{{term_font_name}}"
style = "Bold Italic"

[font.italic]
family = "{{term_font_name}}"
style = "Italic"

[font.normal]
family = "{{term_font_name}}"
# family = "Glass TTY VT220"
# family = "monospace"
style = "Regular"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
{{#if dotter.macos}}
command = "open"
{{else}}
command = "xdg-open"
{{/if}}
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods = "None"

[terminal.shell]
program = "zsh"

[window]
dynamic_title = true
option_as_alt = "Both"
dimensions = { columns = 90, lines = 30 }

[keyboard]
# Shift+Return sends ESC+Enter (same as Option+Enter) to work in tmux
bindings = [{ key = "Return", mods = "Shift", chars = "\u001b\r" }]

