[env]
TERM = "xterm-256color"

[font]
size = {{term_font_size}}

[font.bold]
family = "{{term_font_name}}"
style = "Bold"

[font.bold_italic]
family = "{{term_font_name}}"
style = "Bold Italic"

[font.italic]
family = "{{term_font_name}}"
style = "Italic"

[font.normal]
family = "{{term_font_name}}"
# family = "Glass TTY VT220"
# family = "monospace"
style = "Regular"

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
{{#if dotter.macos}}
command = "open"
{{else}}
command = "xdg-open"
{{/if}}
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods = "None"

[terminal.shell]
program = "zsh"

[window]
dynamic_title = true
option_as_alt = "Both"
dimensions = { columns = 90, lines = 30 }

[keyboard]
# Shift+Return sends ESC+Enter (same as Option+Enter) to work in tmux
bindings = [{ key = "Return", mods = "Shift", chars = "\u001b\r" }]

[general]
import = [
  "~/.config/alacritty/themes/github_light.toml"
]

