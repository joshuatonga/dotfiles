gui:
  scrollHeight: 10
os:
  editPreset: "nvim"
customCommands:
  - key: "K"
    command: "git cz commit"
    context: "files"
    loadingText: "opening commitizen commit tool"
    output: terminal

# for macos
git:
  overrideGpg: true
  pagers:
    - pager: delta --dark --paging=never --color-only
    #- pager: diff-so-fancy
